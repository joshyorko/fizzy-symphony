# fizzy-symphony config
# Generated by: fizzy-symphony setup

instance:
  # Required: no. Default: stable hash of this config path.
  # Environment: FIZZY_SYMPHONY_INSTANCE_ID
  # Used in claim comments/tags, status files, logs, and workspace metadata.
  id: auto

  # Required: no. Default: hostname plus basename of config directory.
  # Human-readable label for status surfaces.
  label: auto

fizzy:
  # Required: yes. Environment: FIZZY_API_TOKEN.
  # Setup validates this with GET /my/identity.
  token: $FIZZY_API_TOKEN

  # Required: yes. Example: my-account.
  # Setup selects this from the identity response.
  account: my-account

  # Required: no. Default: https://app.fizzy.do.
  # Environment: FIZZY_API_URL.
  api_url: https://app.fizzy.do

  # Required: no. Default: empty.
  # If set, setup validates this user ID and claims may assign/watch cards for visibility.
  bot_user_id: ""

boards:
  # Required: yes. Default: setup-selected board entries.
  # Board entries own local routing defaults but do not replace golden-ticket routes.
  entries:
    - id: board_123
      label: Agent Playground
      enabled: true
      routing_mode: column_scoped
      defaults:
        backend: codex
        model: gpt-5.5
        workspace: app
        persona: repo-agent
        unknown_managed_tag_policy: fail
        allowed_card_overrides:
          backend: false
          model: false
          workspace: false
          persona: false
          priority: true
          completion: false
        concurrency:
          max_concurrent: 2

server:
  # Required: no. Default: 127.0.0.1.
  # The same local HTTP server hosts status endpoints and the webhook path.
  host: 127.0.0.1

  # Required: no. Default: auto.
  # "auto" binds and holds the first available port from base_port.
  port: auto

  # Required: no. Default: next_available.
  # Valid: fixed, next_available, random.
  port_allocation: next_available

  # Required when port is auto or next_available. Default: 4567.
  base_port: 4567

  # Required: no. Default: .fizzy-symphony/run/instances.
  registry_dir: .fizzy-symphony/run/instances

  # Required: no. Default: 5000 ms.
  heartbeat_interval_ms: 5000

webhook:
  # Required: no. Default: true.
  enabled: true

  # Required: no. Default: /webhook.
  path: /webhook

  # Required for public webhooks. Environment: FIZZY_WEBHOOK_SECRET.
  # If absent, setup MUST warn and daemon MUST mark webhook signatures disabled.
  secret: $FIZZY_WEBHOOK_SECRET

  # Required: no. Default: 300 seconds.
  # Webhook events older than this are rejected when the payload/header carries a timestamp.
  max_event_age_seconds: 300

  # Required: no. Default: false.
  # When true, setup manages Fizzy webhooks for watched boards using the API.
  manage: false

  # Required: no. Setup fills this when it creates or adopts managed webhooks.
  # Keys are board IDs, values are Fizzy webhook IDs for that board.
  managed_webhook_ids_by_board: {}

  # Required only when manage is true. Must be reachable by Fizzy, not just localhost.
  callback_url: ""

  # Required: no. Default: the events needed by the router.
  subscribed_actions:
    - card_assigned
    - card_closed
    - card_postponed
    - card_auto_postponed
    - card_board_changed
    - card_published
    - card_reopened
    - card_sent_back_to_triage
    - card_triaged
    - card_unassigned
    - comment_created

polling:
  # Required: no. Default: 30000 ms.
  interval_ms: 30000

  # Required: no. Default: true.
  # Uses ETag/If-None-Match for endpoints that return cache validators.
  use_etags: true

  # Required: no. Default: true.
  # Uses Fizzy API filters for golden tickets and candidate cards before local validation.
  use_api_filters: true

  # Required: no. Optional narrow API-side filters. Local route validation remains authoritative.
  api_filters:
    # Optional list. Defaults to enabled boards.
    board_ids: []
    # Optional list. Defaults to columns that have discovered routes.
    column_ids: []
    # Optional list of Fizzy tag IDs to ask the API for before local validation.
    tag_ids: []
    # Optional list of Fizzy user IDs.
    assignee_ids: []
    # Optional API assignment filter, for example assigned or unassigned.
    assignment_status: ""
    # Optional API index for candidate cards. Golden-ticket refresh always uses indexed_by=golden.
    indexed_by: ""
    # Optional API sort key.
    sorted_by: ""
    # Optional API search terms.
    terms: []

agent:
  # Required: no. Default: 1 for setup-created starter boards, otherwise 2.
  max_concurrent: 2

  # Required: no. Default: 1 per card.
  max_concurrent_per_card: 1

  # Required: no. Default: 3600000 ms.
  turn_timeout_ms: 3600000

  # Required: no. Default: 300000 ms.
  stall_timeout_ms: 300000

  # Required: no. Default: 1.
  # Same-thread continuation is not implemented yet; startup rejects values above 1.
  max_turns: 1

  # Required: no. Default: 300000 ms.
  max_retry_backoff_ms: 300000

  # Required: no. Default: codex.
  # MVP valid value: codex. This field exists so route records are explicit; it is not an arbitrary
  # backend plugin surface in MVP.
  default_backend: codex

  # Required: no. Default: gpt-5.5.
  # This is sent to the Codex app-server unless a route/card override supplies a model.
  default_model: gpt-5.5

  # Required: no. Default: medium.
  # Codex reasoning effort. Valid: low, medium, high, xhigh.
  reasoning_effort: medium

  # Required: no. Default: repo-agent.
  default_persona: repo-agent

runner:
  # Required: no. Default: sdk.
  # SDK is the preferred path when an exact supported SDK package is configured.
  # MVP builds without a selected SDK MUST fall back to cli_app_server through this same runner API.
  # Valid: sdk, cli_app_server.
  preferred: sdk

  # Required: no. Default: cli_app_server.
  # Valid: cli_app_server, none.
  fallback: cli_app_server

  # Required: no. Default: true for MVP until an SDK contract is selected.
  # If false, startup fails when the preferred runner is unavailable.
  allow_fallback: true

  sdk:
    # Required only when preferred sdk is selected.
    # SDK is preferred only when this exact package and contract are selected.
    # Environment: CODEX_SDK_PACKAGE.
    package: ""

    # Required only when preferred sdk is selected.
    # Exact SDK protocol/runner contract supported by this implementation.
    contract: ""

    # Required: no. Default: false.
    # If true, setup may perform a non-mutating smoke test.
    smoke_test: false

  cli_app_server:
    # Required for fallback. Default: codex + app-server argv.
    # Setup validates executable presence and app-server startup/schema when safe.
    # Implementations MUST launch without shell eval.
    command: codex
    args:
      - app-server

  # Required: no. Default: 10000 ms.
  # Maximum time to wait for the initialize handshake.
  initialize_timeout_ms: 10000

  # Required: no. Default: 60000 ms.
  # Maximum time to wait for ordinary app-server requests.
  request_timeout_ms: 60000

  # Required: no. Default: 10000 ms.
  # Maximum time to wait for turn/interrupt before cancellation escalates.
  cancel_timeout_ms: 10000

  # Required: no. Default: 10000 ms.
  # Maximum time to wait for thread unsubscribe during session stop.
  stop_session_timeout_ms: 10000

  # Required: no. Default: 5000 ms.
  # Grace period after SIGTERM before app-server process termination escalates.
  terminate_timeout_ms: 5000

  # Required: no. Default: 2000 ms.
  # Grace period after SIGKILL before manual intervention is surfaced.
  kill_timeout_ms: 2000

  # Required: no. Default: inherited from agent.turn_timeout_ms.
  # Set only to override the per-turn stream wait used by the app-server runner.
  stream_timeout_ms: 3600000

  # Required: no. Default: 65536 bytes.
  # Bounded stderr retained for app-server failure diagnostics.
  max_stderr_bytes: 65536

  health:
    # Required: no. Default: true.
    enabled: true

    # Required: no. Default: 60000 ms.
    interval_ms: 60000

  codex:
    # Required: no. Default: reject all unattended approval/input requests.
    # Implementations MUST map these generated settings to values accepted by the targeted Codex
    # app-server schema. Do not use Codex protocol values that silently auto-approve commands in
    # unattended mode.
    approval_policy:
      mode: reject
      sandbox_approval: reject
      command_approval: reject
      tool_approval: reject
      mcp_elicitation: reject

    # Required: no. Default: false.
    interactive: false

    # Required: no. Default: workspace-write.
    thread_sandbox: workspace-write

    # Required: no. Default: workspaceWrite scoped to the card workspace.
    turn_sandbox_policy:
      type: workspaceWrite

workspaces:
  # Required: yes. Default: .fizzy-symphony/workspaces.
  root: .fizzy-symphony/workspaces

  # Required: yes. Default: .fizzy-symphony/run/workspaces.
  metadata_root: .fizzy-symphony/run/workspaces

  # Required: yes. Default: git_worktree.
  # Valid: git_worktree. git_clone/copy are rejected until implemented.
  default_isolation: git_worktree

  # Required for git_worktree.
  # Example source repo that contains WORKFLOW.md.
  default_repo: .

  # Required: no. Named workspace registry.
  registry:
    app:
      repo: .
      isolation: git_worktree
      base_ref: main
      worktree_root: .fizzy-symphony/worktrees
      branch_prefix: fizzy
      workflow_path: WORKFLOW.md
      require_clean_source: true

  retry:
    # Required: no. Default: reuse.
    # Valid: reuse, fresh_on_operator_request.
    # Automatic fresh workspaces are forbidden unless an operator explicitly requests them.
    workspace_policy: reuse

workflow:
  # Required: no. Default: false.
  # If true, setup may create a starter WORKFLOW.md after explicit confirmation.
  create_starter_on_setup: false

  # Required: no. Default: false.
  # If true, dispatch may use fallback_path when a repo lacks WORKFLOW.md.
  fallback_enabled: false

  # Required only when fallback_enabled is true.
  fallback_path: ""

routing:
  # Required: no. Default: false.
  allow_postponed_cards: false

  rerun:
    # Required: no. Default: explicit_tag_only.
    # Valid: explicit_tag_only, explicit_tag_or_route_change.
    mode: explicit_tag_only

    # Required: no. Default: remove_when_supported.
    # Valid: remove_when_supported, record_consumed_only.
    agent_rerun_consumption: remove_when_supported

diagnostics:
  # Required: no. Default: false.
  # If true, startup may expose status but MUST NOT dispatch cards.
  no_dispatch: false

claims:
  # Required: no. Default: structured_comment.
  # MVP valid value: structured_comment.
  mode: structured_comment

  # Required: no. Default: false.
  # Optional human-visible tag only. The structured comment remains authoritative.
  tag_visibility: false

  # Required only when tag_visibility is true.
  tag: agent-claimed

  # Required: no. Default: false.
  # If true, requires fizzy.bot_user_id and toggles assignment after claim acquisition.
  assign_on_claim: false

  # Required: no. Default: false.
  # If true, the daemon watches claimed cards as the current Fizzy identity.
  watch_on_claim: false

  # Required: no. Default: 900000 ms.
  lease_ms: 900000

  # Required: no. Default: 300000 ms.
  renew_interval_ms: 300000

  # Required: no. Default: 30000 ms.
  # Expired claims are stealable only after this grace period.
  steal_grace_ms: 30000

  # Required: no. Default: 30000 ms.
  max_clock_skew_ms: 30000

completion:
  # Required: no. Default: false.
  # Completion policy MUST still be explicit on each golden-ticket route.
  allow_card_completion_override: false

  markers:
    # Required: no. Default: structured_comment_and_tag.
    mode: structured_comment_and_tag

    # Required: no. Used for board-native completion marker tags.
    success_tag_prefix: agent-completed

    # Required: no. Used for non-looping completion-policy failure tags.
    failure_tag_prefix: agent-completion-failed

workpad:
  # Required: no. Default: true.
  enabled: true

  # Required: no. Default: single_comment.
  # Valid: single_comment, disabled.
  mode: single_comment

  # Required: no. Default: 30000 ms.
  # Minimum interval between live progress updates to avoid comment churn.
  update_interval_ms: 30000

safety:
  # Required: yes. Default: config directory and configured workspace roots.
  # All paths are canonicalized before comparison.
  allowed_roots:
    - .
    - .fizzy-symphony

  # Required: no. Default: fail.
  # Valid: fail, snapshot.
  dirty_source_repo_policy: fail

  cleanup:
    # Required: no. Default: preserve.
    # Valid: preserve, remove_clean_only, archive_after_retention.
    policy: preserve

    # Required: no. Default: true.
    require_proof_before_cleanup: true

    # Required: no. Default: true.
    require_handoff_before_cleanup: true

    # Required: no. Default: true.
    forbid_force_remove: true

    # Required: no. Default: 604800000 ms.
    retention_ms: 604800000

observability:
  # Required: no. Default: .fizzy-symphony/run.
  state_dir: .fizzy-symphony/run

  # Required: no. Default: .fizzy-symphony/logs.
  log_dir: .fizzy-symphony/logs

  # Required: no. Default: .fizzy-symphony/run/status/latest.json.
  status_snapshot_path: .fizzy-symphony/run/status/latest.json

  # Required: no. Default: 604800000 ms.
  status_retention_ms: 604800000

  # Required: no. Default: json.
  log_format: json

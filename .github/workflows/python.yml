---
name: Python

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and developer tools
        run: python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: >-
          python -m compileall
          src
          robots/workitems
          test-projects/workai-smoke

      - name: Run tests
        run: python -m pytest -q

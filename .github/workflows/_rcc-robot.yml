---
name: RCC Robot

"on":
  workflow_call:
    inputs:
      suite:
        description: Suite directory under robot_tests.
        required: true
        type: string
      task:
        description: RCC task name to run from the suite robot.yaml.
        required: true
        type: string
    secrets:
      FIZZY_SYMPHONY_BOARD_ID:
        required: false
      FIZZY_SYMPHONY_CARD_NUMBER:
        required: false
      FIZZY_SYMPHONY_PROMPT:
        required: false
      FIZZY_SYMPHONY_WORKSPACE:
        required: false
      FIZZY_SYMPHONY_LIVE_FIZZY:
        required: false
      WORKAI_SMOKE_BOARD_ID:
        required: false
      WORKAI_SMOKE_LIVE_FIZZY:
        required: false
      WORKAI_SMOKE_HANDOFF_COLUMN_ID:
        required: false
      WORKAI_SMOKE_CARD_NUMBERS:
        required: false
      WORKAI_SMOKE_GOLDEN_CARD_NUMBER:
        required: false

permissions:
  contents: read

jobs:
  rcc:
    name: ${{ matrix.os }} / ${{ inputs.suite }} / ${{ inputs.task }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      PYTHONUNBUFFERED: "1"
      FIZZY_SYMPHONY_BOARD_ID: ${{ secrets.FIZZY_SYMPHONY_BOARD_ID }}
      FIZZY_SYMPHONY_CARD_NUMBER: ${{ secrets.FIZZY_SYMPHONY_CARD_NUMBER }}
      FIZZY_SYMPHONY_PROMPT: ${{ secrets.FIZZY_SYMPHONY_PROMPT }}
      FIZZY_SYMPHONY_WORKSPACE: ${{ secrets.FIZZY_SYMPHONY_WORKSPACE }}
      FIZZY_SYMPHONY_LIVE_FIZZY: ${{ secrets.FIZZY_SYMPHONY_LIVE_FIZZY }}
      WORKAI_SMOKE_BOARD_ID: ${{ secrets.WORKAI_SMOKE_BOARD_ID }}
      WORKAI_SMOKE_LIVE_FIZZY: ${{ secrets.WORKAI_SMOKE_LIVE_FIZZY }}
      WORKAI_SMOKE_HANDOFF_COLUMN_ID: ${{ secrets.WORKAI_SMOKE_HANDOFF_COLUMN_ID }}
      WORKAI_SMOKE_CARD_NUMBERS: ${{ secrets.WORKAI_SMOKE_CARD_NUMBERS }}
      WORKAI_SMOKE_GOLDEN_CARD_NUMBER: ${{ secrets.WORKAI_SMOKE_GOLDEN_CARD_NUMBER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure RCC environment roots
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "ROBOCORP_HOME=${RUNNER_TEMP}/robocorp/${{ inputs.suite }}"
            echo "RCC_HOME=${RUNNER_TEMP}/rcc/${{ inputs.suite }}"
          } >> "${GITHUB_ENV}"

      - name: Install RCC
        id: install-rcc
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RCC_REPOSITORY: joshyorko/rcc
        run: |
          set -euo pipefail

          release_json="${RUNNER_TEMP}/rcc-release.json"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${RCC_REPOSITORY}/releases/latest" \
            -o "${release_json}"

          asset_url_file="${RUNNER_TEMP}/rcc-asset-url.txt"
          asset_name_file="${RUNNER_TEMP}/rcc-asset-name.txt"
          python - \
            "${release_json}" \
            "${RUNNER_OS}" \
            "${asset_url_file}" \
            "${asset_name_file}" <<'PY'
          import json
          import sys

          args = sys.argv[1:]
          release_path, runner_os, asset_url_path, asset_name_path = args
          release = json.load(open(release_path, encoding="utf-8"))
          os_token = {"Linux": "linux", "Windows": "windows"}[runner_os]
          arch_tokens = ("amd64", "x86_64", "x64")
          blocked_tokens = (".sha", "checksum", "checksums", ".json", ".txt")

          best = None
          best_score = -1
          for asset in release.get("assets", []):
              name = asset.get("name", "")
              lower_name = name.lower()
              if any(token in lower_name for token in blocked_tokens):
                  continue
              if os_token not in lower_name:
                  continue

              score = 10
              if any(token in lower_name for token in arch_tokens):
                  score += 5
              if lower_name.endswith((".zip", ".tar.gz", ".tgz", ".exe")):
                  score += 3
              if "rcc" in lower_name:
                  score += 1

              if score > best_score:
                  best = asset
                  best_score = score

          if not best:
              names = ", ".join(
                  asset.get("name", "") for asset in release.get("assets", [])
              )
              msg = f"No RCC release asset matched {runner_os}. Assets: {names}"
              raise SystemExit(msg)

          with open(asset_url_path, "w", encoding="utf-8") as output:
              output.write(best["browser_download_url"])
          with open(asset_name_path, "w", encoding="utf-8") as output:
              output.write(best["name"])
          PY

          asset_url="$(cat "${asset_url_file}")"
          asset_name="$(cat "${asset_name_file}")"
          asset_path="${RUNNER_TEMP}/${asset_name}"
          install_dir="${RUNNER_TEMP}/rcc-install"
          bin_dir="${RUNNER_TEMP}/rcc-bin"
          mkdir -p "${install_dir}" "${bin_dir}"
          curl -fL "${asset_url}" -o "${asset_path}"

          case "${asset_path,,}" in
            *.zip)
              python - "${asset_path}" "${install_dir}" <<'PY'
          import sys
          import zipfile

          with zipfile.ZipFile(sys.argv[1]) as archive:
              archive.extractall(sys.argv[2])
          PY
              ;;
            *.tar.gz|*.tgz)
              tar -xzf "${asset_path}" -C "${install_dir}"
              ;;
            *.exe)
              cp "${asset_path}" "${install_dir}/rcc.exe"
              ;;
            *)
              cp "${asset_path}" "${install_dir}/rcc"
              ;;
          esac

          rcc_bin="$(
            find "${install_dir}" \
              -type f \( -iname rcc -o -iname rcc.exe \) |
              head -n 1
          )"
          if [[ -z "${rcc_bin}" ]]; then
            echo "RCC asset did not contain rcc or rcc.exe" >&2
            find "${install_dir}" -maxdepth 4 -type f >&2
            exit 1
          fi

          cp "${rcc_bin}" "${bin_dir}/$(basename "${rcc_bin}")"
          chmod +x "${bin_dir}/$(basename "${rcc_bin}")"
          echo "${bin_dir}" >> "${GITHUB_PATH}"
          {
            echo "url=${asset_url}"
            echo "name=${asset_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show RCC version
        shell: bash
        run: rcc version

      - name: Resolve RCC holotree variables
        shell: bash
        run: >-
          rcc ht vars
          -r "robot_tests/${{ inputs.suite }}/robot.yaml"
          --json

      - name: Run RCC robot task
        shell: bash
        run: >-
          rcc run
          -r "robot_tests/${{ inputs.suite }}/robot.yaml"
          --dev
          -t "${{ inputs.task }}"

      - name: Upload RCC output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rcc-${{ inputs.suite }}-${{ inputs.task }}-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            robot_tests/${{ inputs.suite }}/output
            output

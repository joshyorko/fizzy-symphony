---
name: RCC Robot

"on":
  workflow_call:
    inputs:
      suite:
        description: Suite directory under robot_tests.
        required: true
        type: string
      task:
        description: RCC task name to run from the suite robot.yaml.
        required: true
        type: string
    secrets:
      FIZZY_SYMPHONY_BOARD_ID:
        required: false
      FIZZY_SYMPHONY_CARD_NUMBER:
        required: false
      FIZZY_SYMPHONY_PROMPT:
        required: false
      FIZZY_SYMPHONY_WORKSPACE:
        required: false
      FIZZY_SYMPHONY_LIVE_FIZZY:
        required: false
      WORKAI_SMOKE_BOARD_ID:
        required: false
      WORKAI_SMOKE_LIVE_FIZZY:
        required: false
      WORKAI_SMOKE_HANDOFF_COLUMN_ID:
        required: false
      WORKAI_SMOKE_CARD_NUMBERS:
        required: false
      WORKAI_SMOKE_GOLDEN_CARD_NUMBER:
        required: false

permissions:
  contents: read

jobs:
  rcc:
    name: ${{ matrix.os }} / ${{ inputs.suite }} / ${{ inputs.task }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      PYTHONUNBUFFERED: "1"
      FIZZY_SYMPHONY_BOARD_ID: ${{ secrets.FIZZY_SYMPHONY_BOARD_ID }}
      FIZZY_SYMPHONY_CARD_NUMBER: ${{ secrets.FIZZY_SYMPHONY_CARD_NUMBER }}
      FIZZY_SYMPHONY_PROMPT: ${{ secrets.FIZZY_SYMPHONY_PROMPT }}
      FIZZY_SYMPHONY_WORKSPACE: ${{ secrets.FIZZY_SYMPHONY_WORKSPACE }}
      FIZZY_SYMPHONY_LIVE_FIZZY: ${{ secrets.FIZZY_SYMPHONY_LIVE_FIZZY }}
      WORKAI_SMOKE_BOARD_ID: ${{ secrets.WORKAI_SMOKE_BOARD_ID }}
      WORKAI_SMOKE_LIVE_FIZZY: ${{ secrets.WORKAI_SMOKE_LIVE_FIZZY }}
      WORKAI_SMOKE_HANDOFF_COLUMN_ID: ${{ secrets.WORKAI_SMOKE_HANDOFF_COLUMN_ID }}
      WORKAI_SMOKE_CARD_NUMBERS: ${{ secrets.WORKAI_SMOKE_CARD_NUMBERS }}
      WORKAI_SMOKE_GOLDEN_CARD_NUMBER: ${{ secrets.WORKAI_SMOKE_GOLDEN_CARD_NUMBER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure RCC environment roots
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "ROBOCORP_HOME=${RUNNER_TEMP}/robocorp/${{ inputs.suite }}"
            echo "RCC_HOME=${RUNNER_TEMP}/rcc/${{ inputs.suite }}"
          } >> "${GITHUB_ENV}"

      - name: Install RCC
        id: install-rcc
        shell: bash
        env:
          RCC_REPOSITORY: joshyorko/rcc
          RCC_VERSION: v18.17.3
          RCC_LINUX_SHA256: b1244cd6f8c9415e5f24f98f972620475bdced1c24590b3e823ade8e04acb62e
          RCC_WINDOWS_SHA256: 2b54e8075ff3cb3275e761ab7bd8ca642870bad7306533791b11397eec96d13c
        run: |
          set -euo pipefail

          case "${RUNNER_OS}" in
            Linux)
              asset_name="rcc-linux64"
              expected_sha256="${RCC_LINUX_SHA256}"
              ;;
            Windows)
              asset_name="rcc-windows64.exe"
              expected_sha256="${RCC_WINDOWS_SHA256}"
              ;;
            *)
              echo "Unsupported RCC runner OS: ${RUNNER_OS}" >&2
              exit 1
              ;;
          esac

          asset_url="https://github.com/${RCC_REPOSITORY}/releases/download/${RCC_VERSION}/${asset_name}"
          asset_path="${RUNNER_TEMP}/${asset_name}"
          install_dir="${RUNNER_TEMP}/rcc-install"
          bin_dir="${RUNNER_TEMP}/rcc-bin"
          mkdir -p "${install_dir}" "${bin_dir}"
          curl -fL "${asset_url}" -o "${asset_path}"
          echo "${expected_sha256}  ${asset_path}" | sha256sum --check -

          case "${asset_path,,}" in
            *.zip)
              python - "${asset_path}" "${install_dir}" <<'PY'
          import sys
          import zipfile

          with zipfile.ZipFile(sys.argv[1]) as archive:
              archive.extractall(sys.argv[2])
          PY
              ;;
            *.tar.gz|*.tgz)
              tar -xzf "${asset_path}" -C "${install_dir}"
              ;;
            *.exe)
              cp "${asset_path}" "${install_dir}/rcc.exe"
              ;;
            *)
              cp "${asset_path}" "${install_dir}/rcc"
              ;;
          esac

          rcc_bin="$(
            find "${install_dir}" \
              -type f \( -iname rcc -o -iname rcc.exe \) |
              head -n 1
          )"
          if [[ -z "${rcc_bin}" ]]; then
            echo "RCC asset did not contain rcc or rcc.exe" >&2
            find "${install_dir}" -maxdepth 4 -type f >&2
            exit 1
          fi

          cp "${rcc_bin}" "${bin_dir}/$(basename "${rcc_bin}")"
          chmod +x "${bin_dir}/$(basename "${rcc_bin}")"
          echo "${bin_dir}" >> "${GITHUB_PATH}"
          {
            echo "url=${asset_url}"
            echo "name=${asset_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show RCC version
        shell: bash
        run: rcc version

      - name: Resolve RCC holotree variables
        shell: bash
        run: >-
          rcc ht vars
          -r "robot_tests/${{ inputs.suite }}/robot.yaml"
          --json

      - name: Run RCC robot task
        shell: bash
        run: >-
          rcc run
          -r "robot_tests/${{ inputs.suite }}/robot.yaml"
          --dev
          -t "${{ inputs.task }}"

      - name: Upload RCC output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rcc-${{ inputs.suite }}-${{ inputs.task }}-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            robot_tests/${{ inputs.suite }}/output
            output

---
# yamllint disable rule:line-length
channels:
  - conda-forge

dependencies:
  - python=3.12.11
  - git
  - nodejs=24
  - pytest=9.0.2
  - uv=0.11.7
  - pip:
      # Official OpenAI Python SDK for codex app-server; PyPI currently has a
      # conflicting third-party artifact under this project name.
      - "codex-app-server-sdk @ git+https://github.com/openai/codex.git@87bc72408c5ef08f8d21f2cdd00c55451c3be33f#subdirectory=sdk/python"
      # Focused Robocorp packages only; do not install the broad robocorp meta package.
      - robocorp-tasks==4.1.1  # https://pypi.org/project/robocorp-tasks
      - robocorp-log==3.1.2  # https://pypi.org/project/robocorp-log
      - robocorp-workitems==1.5.0  # https://pypi.org/project/robocorp-workitems
      - robocorp-adapters-custom==0.1.5  # https://pypi.org/project/robocorp-adapters-custom

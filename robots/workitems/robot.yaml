# Fizzy Symphony RCC robot.
# Run from the repo root:
#   rcc run -r robots/workitems/robot.yaml -t FizzySymphony -e env.local.json --silent
#
# Dev/diagnostic tasks:
#   rcc run -r robots/workitems/robot.yaml --dev -t Doctor --silent
#   rcc run -r robots/workitems/robot.yaml --dev -t WorkitemsEnv --silent
#   rcc run -r robots/workitems/robot.yaml --dev -t SmokeSQLiteWorkitemFlow -e robots/workitems/devdata/env-sqlite.json --silent
#   rcc run -r robots/workitems/robot.yaml --dev -t FizzySymphonyContractTest --silent
#   rcc run -r robots/workitems/robot.yaml --dev -t FizzySymphonyParityContract --silent
#   rcc run -r robots/workitems/robot.yaml --dev -t FizzySymphonyStatus --silent
#   rcc run -r robots/workitems/robot.yaml --dev -t WorkAIProductionSmoke -e workai-smoke.env.json --silent

tasks:
  FizzySymphony:
    shell: python -m robocorp.tasks run tasks.py -t FizzySymphony

devTasks:
  Doctor:
    shell: python -m robocorp.tasks run tasks.py -t Doctor

  WorkitemsEnv:
    shell: python -m robocorp.tasks run tasks.py -t WorkitemsEnv

  SmokeSQLiteWorkitemFlow:
    shell: python -m robocorp.tasks run tasks.py -t SmokeSQLiteWorkitemFlow

  WorkAIProductionSmoke:
    shell: python -m robocorp.tasks run tasks.py -t WorkAIProductionSmoke

  FizzySymphonyContractTest:
    shell: python -m robocorp.tasks run tasks.py -t FizzySymphonyContractTest

  FizzySymphonyParityContract:
    shell: python -m robocorp.tasks run tasks.py -t FizzySymphonyParityContract

  FizzySymphonyStatus:
    shell: python -m robocorp.tasks run tasks.py -t FizzySymphonyStatus

  PromptCardSmoke:
    shell: python -m robocorp.tasks run tasks.py -t PromptCardSmoke

  RunSymphony:
    shell: python -m robocorp.tasks run tasks.py -t RunSymphony

environmentConfigs:
  - conda.yaml

artifactsDir: output

PATH:
  - .

PYTHONPATH:
  - .
  - ../..
  - ../../src

ignoreFiles:
  - ../../.gitignore
